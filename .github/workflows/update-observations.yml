name: Update Observations JSON

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run parser
        run: node parse-observations.js

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add observations.json comparison-data.json
          git diff --staged --quiet && echo "No changes" || git commit -m "Update observations.json — $(date -u '+%Y-%m-%d')" && git push
