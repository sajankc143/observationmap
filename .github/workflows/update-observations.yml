name: Update Observations JSON

on:
  schedule:
    # Runs at 02:00 UTC every day (adjust to your preferred time)
    - cron: '0 2 * * *'
  workflow_dispatch:
    # Also allows manual trigger from GitHub Actions tab

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run parser
        run: node parse-observations.js

      - name: Check if observations.json changed
        id: diff
        run: |
          git diff --quiet observations.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add observations.json
          COUNT=$(node -e "const d=require('./observations.json'); console.log(d.count)")
          git commit -m "Update observations.json — ${COUNT} records ($(date -u '+%Y-%m-%d'))"
          git push
